<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction</title>
    <style>
        body {
            background: #1e1e2f;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        form {
            background: #2a2a40;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            margin: auto;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00adb5;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
        }

        .result-card {
            background: #22223b;
            margin: 10px auto;
            padding: 10px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        .bar {
            height: 10px;
            border-radius: 5px;
            background: #00ffcc;
        }
    </style>
</head>
<body>

<h1>🩺 Disease Prediction System</h1>

<form action="/predict" method="POST">
    <input type="text" name="name" placeholder="Enter your name" required>

    {% for i in range(1,6) %}
        <select name="symptom{{i}}">
            <option value="">--Select Symptom--</option>
            {% for symptom in symptoms %}
                <option value="{{symptom}}">{{symptom}}</option>
            {% endfor %}
        </select>
    {% endfor %}

    <button type="submit">🔍 Predict</button>
</form>

{% if results %}
    <h3>Hello {{ name }}, possible diseases:</h3>

    {% for r in results %}
        <div class="result-card">
            <strong>{{ r.disease }}</strong><br>
            {{ r.prob }}%
            <div class="bar" style="width: {{ r.prob }}%"></div>
        </div>
    {% endfor %}
{% endif %}

</body>
</html>
